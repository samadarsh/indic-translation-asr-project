# docker-compose.yml
# Modular deployment for ASR + Transliteration System

version: "3.8"

services:
  asr-system:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: asr-transliteration-system

    ports:
      - "7860:7860"

    volumes:
      # Persist outputs outside the container
      - ./outputs:/app/outputs
      # Mount sample inputs so container can access them
      - ./sample_inputs:/app/sample_inputs

    environment:
      - PYTHONUNBUFFERED=1
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7860" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
